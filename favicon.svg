<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="fg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d7a50"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </radialGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="49" fill="#c9a227"/>
  <!-- Dark separator -->
  <circle cx="50" cy="50" r="44" fill="#111"/>
  <!-- Gold inner ring -->
  <circle cx="50" cy="50" r="40" fill="#c9a227"/>
  <!-- Dark inner border -->
  <circle cx="50" cy="50" r="37" fill="#111"/>
  <!-- Green background -->
  <circle cx="50" cy="50" r="33" fill="url(#fg)"/>
  <!-- CN Tower (simplified) -->
  <polygon points="50,22 49,28 51,28" fill="#c9a227"/>
  <rect x="49" y="27" width="2" height="10" fill="#c9a227"/>
  <rect x="47.5" y="35" width="5" height="7" fill="#c9a227"/>
  <rect x="46" y="37" width="8" height="3" fill="#c9a227"/>
  <!-- Skyline hint -->
  <rect x="36" y="40" width="28" height="2" fill="#c9a227"/>
  <rect x="38" y="37" width="4" height="4" fill="#c9a227"/>
  <rect x="44" y="35" width="4" height="6" fill="#c9a227"/>
  <rect x="52" y="36" width="4" height="5" fill="#c9a227"/>
  <rect x="57" y="38" width="3" height="3" fill="#c9a227"/>
  <!-- Golf flag pole -->
  <line x1="50" y1="43" x2="50" y2="62" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Red flag -->
  <polygon points="50,43 60,47 50,51" fill="#cc0000"/>
  <!-- Golf green -->
  <ellipse cx="50" cy="66" rx="20" ry="5" fill="#2d8a4e"/>
  <!-- Golf ball -->
  <circle cx="50" cy="60" r="4.5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.3"/>
  <!-- Tee -->
  <line x1="50" y1="63" x2="50" y2="66" stroke="#c9a227" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="33" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.5"/>
</svg>
