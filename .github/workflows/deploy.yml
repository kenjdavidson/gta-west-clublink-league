name: Deploy

on:
  push:
    branches:
      - main

# Allow one concurrent deployment; cancel any in-progress run for the same branch
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Fetch scores and deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push updated score data and to push to gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch scores from Golf Canada API
        env:
          GOLFCANADA_USERNAME: ${{ secrets.GOLFCANADA_USERNAME }}
          GOLFCANADA_PASSWORD: ${{ secrets.GOLFCANADA_PASSWORD }}
        run: npm run fetch-scores

      - name: Commit updated score data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git diff --cached --quiet || (git commit -m "chore: update score data [skip ci]" && git pull --rebase && git push)

      - name: Build site
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
