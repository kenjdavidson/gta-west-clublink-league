<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a6b35"/>
      <stop offset="100%" stop-color="#0d3d1e"/>
    </radialGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="49" fill="#c9a227"/>
  <!-- Dark separator -->
  <circle cx="50" cy="50" r="44" fill="#1a1a1a"/>
  <!-- Green background -->
  <circle cx="50" cy="50" r="40" fill="url(#bgG)"/>
  <!-- Golf flag pole -->
  <line x1="50" y1="20" x2="50" y2="65" stroke="#d4d4d4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Red flag -->
  <polygon points="50,20 66,27 50,34" fill="#dc2626"/>
  <!-- Golf green surface -->
  <ellipse cx="50" cy="73" rx="26" ry="9" fill="#2d8a4e"/>
  <!-- Golf ball on tee -->
  <line x1="50" y1="68" x2="50" y2="74" stroke="#c9a227" stroke-width="1.5"/>
  <circle cx="50" cy="64" r="6" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Dimples -->
  <circle cx="47.5" cy="62" r="1" fill="#d1d5db"/>
  <circle cx="52.5" cy="62" r="1" fill="#d1d5db"/>
  <circle cx="50" cy="66" r="1" fill="#d1d5db"/>
  <!-- Gold ring accent -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#c9a227" stroke-width="1"/>
</svg>
