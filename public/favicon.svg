<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Golf ball -->
  <circle cx="50" cy="50" r="45" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Simple dimple pattern -->
  <circle cx="50" cy="30" r="4" fill="#d0d0d0"/>
  <circle cx="35" cy="42" r="4" fill="#d0d0d0"/>
  <circle cx="65" cy="42" r="4" fill="#d0d0d0"/>
  <circle cx="50" cy="55" r="4" fill="#d0d0d0"/>
  <circle cx="30" cy="58" r="4" fill="#d0d0d0"/>
  <circle cx="70" cy="58" r="4" fill="#d0d0d0"/>
  <!-- Flag pole -->
  <line x1="50" y1="5" x2="50" y2="50" stroke="#1a5c1a" stroke-width="3"/>
  <!-- Flag -->
  <polygon points="50,5 75,15 50,25" fill="#e63946"/>
</svg>
