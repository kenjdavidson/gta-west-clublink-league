<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Radial gradient for green background -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a6b35"/>
      <stop offset="100%" stop-color="#0d3d1e"/>
    </radialGradient>
    <!-- Gradient for golf green -->
    <radialGradient id="greenGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d8a4e"/>
      <stop offset="100%" stop-color="#1a5c30"/>
    </radialGradient>
    <!-- Text paths for curved labels -->
    <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
    <path id="bottomArc" d="M 30,115 A 72,72 0 0,0 170,115" fill="none"/>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="98" fill="#c9a227"/>
  <!-- Thin black separator -->
  <circle cx="100" cy="100" r="92" fill="#1a1a1a"/>
  <!-- Main green background -->
  <circle cx="100" cy="100" r="88" fill="url(#bgGrad)"/>
  <!-- Inner gold decorative ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c9a227" stroke-width="1.5"/>

  <!-- Curved top text: WEST GTA CLUBLINK MEN'S INVITATIONAL -->
  <path id="topTextArc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#c9a227" letter-spacing="1.5">
    <textPath href="#topTextArc" startOffset="50%" text-anchor="middle">WEST GTA CLUBLINK MEN'S INVITATIONAL</textPath>
  </text>

  <!-- EST. 2026 line with maple leaf -->
  <text x="100" y="45" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#c9a227" text-anchor="middle" letter-spacing="2">EST.</text>
  <!-- Maple leaf (simplified) -->
  <g transform="translate(100,44) scale(0.8)">
    <path d="M0,-7 L1.5,-3 L5,-4 L3,0 L6,2 L3,2 L3,7 L-3,7 L-3,2 L-6,2 L-3,0 L-5,-4 L-1.5,-3 Z" fill="#c9a227"/>
  </g>
  <text x="100" y="55" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#c9a227" text-anchor="middle" letter-spacing="2">2026</text>

  <!-- Toronto skyline silhouette -->
  <g fill="#c9a227" opacity="0.85">
    <!-- CN Tower -->
    <rect x="94" y="62" width="3" height="18"/>
    <ellipse cx="95.5" cy="68" rx="4" ry="2"/>
    <rect x="95" y="60" width="1" height="4"/>
    <!-- Buildings -->
    <rect x="72" y="73" width="8" height="8"/>
    <rect x="81" y="70" width="6" height="11"/>
    <rect x="88" y="68" width="5" height="13"/>
    <rect x="100" y="71" width="6" height="10"/>
    <rect x="107" y="69" width="8" height="12"/>
    <rect x="116" y="72" width="7" height="9"/>
    <!-- Rogers Centre dome -->
    <ellipse cx="83" cy="73" rx="5" ry="2.5"/>
  </g>

  <!-- Golf green (putting surface) -->
  <ellipse cx="100" cy="148" rx="52" ry="18" fill="url(#greenGrad)"/>
  <ellipse cx="100" cy="145" rx="46" ry="10" fill="#2d8a4e"/>

  <!-- Flag pole -->
  <line x1="100" y1="80" x2="100" y2="135" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
  <!-- Red flag -->
  <polygon points="100,80 118,87 100,94" fill="#dc2626"/>

  <!-- Golf ball on tee -->
  <line x1="100" y1="140" x2="100" y2="148" stroke="#c9a227" stroke-width="2"/>
  <circle cx="100" cy="136" r="8" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Dimples -->
  <circle cx="97" cy="133" r="1.2" fill="#d1d5db"/>
  <circle cx="103" cy="133" r="1.2" fill="#d1d5db"/>
  <circle cx="100" cy="137" r="1.2" fill="#d1d5db"/>
  <circle cx="96.5" cy="138" r="1.2" fill="#d1d5db"/>
  <circle cx="103.5" cy="138" r="1.2" fill="#d1d5db"/>

  <!-- Laurel wreath left -->
  <g fill="none" stroke="#c9a227" stroke-width="1.2" opacity="0.9">
    <path d="M 30,108 Q 25,100 30,92"/>
    <path d="M 30,108 Q 22,103 24,95"/>
    <path d="M 30,108 Q 20,107 24,100"/>
    <path d="M 30,108 Q 21,112 26,118"/>
    <path d="M 30,108 Q 25,116 30,122"/>
  </g>
  <!-- Laurel wreath right -->
  <g fill="none" stroke="#c9a227" stroke-width="1.2" opacity="0.9">
    <path d="M 170,108 Q 175,100 170,92"/>
    <path d="M 170,108 Q 178,103 176,95"/>
    <path d="M 170,108 Q 180,107 176,100"/>
    <path d="M 170,108 Q 179,112 174,118"/>
    <path d="M 170,108 Q 175,116 170,122"/>
  </g>

  <!-- Gold dots at sides -->
  <circle cx="18" cy="108" r="3" fill="#c9a227"/>
  <circle cx="182" cy="108" r="3" fill="#c9a227"/>

  <!-- Bottom ribbon banner -->
  <path d="M 55,158 Q 100,164 145,158 L 148,168 Q 100,175 52,168 Z" fill="#c9a227"/>
  <path d="M 55,158 L 50,163 L 52,168 Q 55,161 55,158 Z" fill="#8b6914"/>
  <path d="M 145,158 L 150,163 L 148,168 Q 145,161 145,158 Z" fill="#8b6914"/>
  <!-- CLUBLINK text on ribbon -->
  <text x="100" y="168" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#0d3d1e" text-anchor="middle" letter-spacing="2">CLUBLINK</text>

  <!-- Small maple leaf on ribbon -->
  <g transform="translate(57,164) scale(0.5)">
    <path d="M0,-5 L1,-2 L4,-3 L2.5,0 L5,1.5 L2.5,1.5 L2.5,5 L-2.5,5 L-2.5,1.5 L-5,1.5 L-2.5,0 L-4,-3 L-1,-2 Z" fill="#0d3d1e"/>
  </g>
  <g transform="translate(143,164) scale(0.5)">
    <path d="M0,-5 L1,-2 L4,-3 L2.5,0 L5,1.5 L2.5,1.5 L2.5,5 L-2.5,5 L-2.5,1.5 L-5,1.5 L-2.5,0 L-4,-3 L-1,-2 Z" fill="#0d3d1e"/>
  </g>

  <!-- Curved bottom text: PREMIUM GOLF EVENT -->
  <path id="bottomTextArc" d="M 32,118 A 72,72 0 0,0 168,118" fill="none"/>
  <text font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#c9a227" letter-spacing="2">
    <textPath href="#bottomTextArc" startOffset="50%" text-anchor="middle">PREMIUM GOLF EVENT</textPath>
  </text>
</svg>
