<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Golf flag on green -->
  <rect x="0" y="0" width="100" height="100" rx="12" fill="#166534"/>
  <!-- Flag pole -->
  <line x1="38" y1="20" x2="38" y2="80" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="38,20 72,32 38,44" fill="#fbbf24"/>
  <!-- Golf ball -->
  <circle cx="62" cy="72" r="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Ball dimples -->
  <circle cx="58" cy="67" r="2" fill="#d1d5db"/>
  <circle cx="66" cy="67" r="2" fill="#d1d5db"/>
  <circle cx="62" cy="73" r="2" fill="#d1d5db"/>
  <circle cx="57" cy="76" r="2" fill="#d1d5db"/>
  <circle cx="67" cy="76" r="2" fill="#d1d5db"/>
</svg>
